<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flagstick Finder — Pro Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --green: #1a2e1a; --cream: #f5f0e8; --gold: #c9a84c; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); }
    header { background: var(--green); color: var(--cream); padding: 1.5rem 2rem; border-bottom: 2px solid var(--gold); }
    .logo-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; }
    .logo-name span { color: var(--gold); font-style: italic; }
    .hero { background: linear-gradient(rgba(26,46,26,0.7), rgba(26,46,26,0.7)), url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?w=1200') center/cover; color: var(--cream); padding: 8rem 2rem; text-align: center; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 1rem; }
    .hero h1 em { color: var(--gold); }
    .hero-cta { background: var(--gold); color: var(--green); padding: 0.8rem 2rem; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
    .filter-bar { background: var(--green); padding: 1rem; display: flex; gap: 1rem; overflow-x: auto; }
    .filter-btn { background: transparent; color: var(--cream); border: none; cursor: pointer; padding: 0.5rem 1rem; border-bottom: 2px solid transparent; font-weight: 600; }
    .filter-btn.active { border-bottom-color: var(--gold); color: var(--gold); }
    .grid-section { max-width: 1400px; margin: 3rem auto; padding: 0 2rem; }
    .club-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2px; }
    .club-card { background: white; display: flex; flex-direction: column; transition: transform 0.3s; }
    .club-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .card-img { width: 100%; height: 300px; background: #e0d5c8; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .card-img img { max-width: 90%; max-height: 90%; }
    .gallery-nav { position: absolute; width: 30px; height: 30px; background: rgba(26,46,26,0.8); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; }
    .card-img:hover .gallery-nav { opacity: 1; }
    .gallery-prev { left: 5px; }
    .gallery-next { right: 5px; }
    .type-badge { position: absolute; top: 10px; left: 10px; background: rgba(26,46,26,0.9); color: var(--gold); padding: 4px 8px; font-size: 9px; font-weight: bold; }
    .card-body { padding: 1rem; flex: 1; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; margin-bottom: 0.5rem; }
    .card-desc { font-size: 12px; color: #666; margin-bottom: 1rem; }
    .price-row { display: flex; gap: 0.5rem; align-items: baseline; margin-bottom: 1rem; }
    .price-ask { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--green); font-weight: 700; }
    .price-floor { font-size: 12px; color: #999; }
    .card-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #ddd; }
    .card-cta { padding: 0.8rem; text-align: center; text-decoration: none; font-size: 11px; font-weight: 600; cursor: pointer; border: none; background: white; color: var(--green); transition: all 0.2s; }
    .card-cta:hover { background: var(--green); color: var(--gold); }
    .card-cta.primary { background: var(--green); color: white; }
    footer { background: var(--green); color: var(--cream); text-align: center; padding: 2rem; margin-top: 3rem; }
    footer a { color: var(--gold); text-decoration: none; }
    .section-label { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 1.5rem; border-bottom: 1px solid #ddd; padding-bottom: 0.75rem; }
  </style>
</head>
<body>

<header>

    <div>
      <div class="logo-name">Flagstick <span>Finder</span></div>
      <div style="font-size: 9px; color: #7a9a7a;">PRO SHOP</div>
    </div>
    <div style="text-align: right;">
      <div style="font-size: 11px;">Premium Used Golf Clubs</div>
