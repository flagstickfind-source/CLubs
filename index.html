<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flagstick Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Flagstick Finder</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Clubs</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="clubs">
            <h2>Golf Clubs</h2>
            <div class="carousel">
                <div class="carousel-item">
                    <img src="club1.jpg" alt="Club 1">
                </div>
                <div class="carousel-item">
                    <img src="club2.jpg" alt="Club 2">
                </div>
                <div class="carousel-item">
                    <img src="club3.jpg" alt="Club 3">
                </div>
                <!-- Add more carousel items as needed -->
            </div>
            <h3>Categories</h3>
            <div class="filters">
                <button class="filter" data-category="woods">Woods</button>
                <button class="filter" data-category="irons">Irons</button>
                <button class="filter" data-category="putters">Putters</button>
                <!-- Add more filters as needed -->
            </div>
            <h3>Pricing</h3>
            <div class="pricing">
                <div class="item">
                    <h4>Club 1</h4>
                    <p>$299</p>
                </div>
                <div class="item">
                    <h4>Club 2</h4>
                    <p>$199</p>
                </div>
                <div class="item">
                    <h4>Club 3</h4>
                    <p>$399</p>
                </div>
                <!-- Add more pricing items as needed -->
            </div>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name"><br>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Flagstick Finder</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
