<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flagstick Finds — Premium Used Golf Clubs · DFW</title>
<meta name="description" content="Buy, sell, and trade premium used golf clubs in Dallas–Fort Worth. Scotty Cameron, Miura, Mizuno, Ping and more. Ships nationwide.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a4731;--dark:#122d20;--mid:#245c3e;--pale:#eef5f1;--gborder:#c3ddd0;
  --cream:#f4f0e8;--white:#ffffff;--black:#0d0d0d;
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#8a6a00;
  --gray:#7a7265;--gbray:#e0d9ce;--gmeta:#9ca3af;
  --radius:10px;--trans:0.2s ease;
}
html{scroll-behavior:smooth;}
body{font-family:'Barlow',sans-serif;background:var(--cream);color:var(--black);font-size:15px;line-height:1.6;overflow-x:hidden;}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--dark);height:60px;display:flex;align-items:center;padding:0 1.5rem;gap:1.5rem;border-bottom:1px solid rgba(255,255,255,0.06);}
.nav-logo{display:flex;flex-direction:column;line-height:1;text-decoration:none;flex-shrink:0;}
.nav-logo-main{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:0.04em;color:var(--white);}
.nav-logo-main span{color:var(--gold);}
.nav-logo-sub{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:1px;}
.nav-links{display:flex;align-items:center;gap:0.25rem;flex:1;justify-content:center;}
.nav-links a{font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);text-decoration:none;padding:0.4rem 0.75rem;border-radius:6px;transition:all var(--trans);letter-spacing:0.02em;}
.nav-links a:hover,.nav-links a.active{color:var(--white);background:rgba(255,255,255,0.08);}
.nav-right{display:flex;align-items:center;gap:0.75rem;flex-shrink:0;}
.nav-social{display:flex;gap:0.5rem;}
.nav-social a{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);border-radius:6px;transition:all var(--trans);}
.nav-social a:hover{color:var(--white);background:rgba(255,255,255,0.1);}
.nav-social svg{width:16px;height:16px;}
.nav-cta{font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--white);border:1.5px solid rgba(255,255,255,0.35);padding:0.4rem 1rem;border-radius:6px;text-decoration:none;transition:all var(--trans);letter-spacing:0.04em;white-space:nowrap;}
.nav-cta:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.6);}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
.nav-hamburger span{display:block;width:22px;height:2px;background:rgba(255,255,255,0.7);border-radius:2px;transition:all var(--trans);}

/* Mobile drawer */
.nav-drawer{position:fixed;top:60px;left:0;right:0;bottom:0;background:var(--dark);z-index:99;padding:1.5rem;transform:translateX(-100%);transition:transform 0.28s ease;overflow-y:auto;}
.nav-drawer.open{transform:translateX(0);}
.nav-drawer a{display:block;font-size:18px;font-weight:600;color:rgba(255,255,255,0.8);text-decoration:none;padding:0.85rem 0;border-bottom:1px solid rgba(255,255,255,0.07);}
.nav-drawer a:hover{color:var(--white);}
.drawer-social{display:flex;gap:1rem;margin-top:1.5rem;}
.drawer-social a{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:rgba(255,255,255,0.6);}
.drawer-social a:hover{color:var(--white);border-color:rgba(255,255,255,0.5);}
.drawer-social svg{width:18px;height:18px;}

/* ── HERO ── */
#hero{min-height:100svh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--dark);padding-top:60px;}
.hero-bg{position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?w=1800&q=80&auto=format&fit=crop');background-size:cover;background-position:center 38%;filter:brightness(0.12) saturate(0.4);animation:bgZoom 28s ease-in-out infinite alternate;}
@keyframes bgZoom{from{transform:scale(1);}to{transform:scale(1.06);}}
.hero-grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(18,45,32,0.95) 100%);}
.hero-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem 2rem;gap:1.5rem;text-align:center;}
.hero-kicker{display:inline-flex;align-items:center;gap:10px;color:var(--gold);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;font-weight:600;}
.hero-kicker::before,.hero-kicker::after{content:'';width:28px;height:1px;background:var(--gold);opacity:0.4;}
.hero-h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(58px,10vw,108px);color:var(--white);text-transform:uppercase;line-height:0.9;letter-spacing:-0.02em;}
.hero-serif{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(18px,2.5vw,26px);color:rgba(255,255,255,0.7);font-weight:400;margin-top:-0.25rem;}
.hero-sub{font-family:'Barlow',sans-serif;font-size:clamp(14px,1.8vw,17px);color:rgba(255,255,255,0.5);font-weight:300;letter-spacing:0.04em;}
.hero-split{display:grid;grid-template-columns:1fr 1fr;gap:1px;width:100%;max-width:820px;background:rgba(255,255,255,0.07);border-radius:var(--radius);overflow:hidden;margin-top:0.5rem;}
.hero-card{background:rgba(18,45,32,0.8);backdrop-filter:blur(16px);padding:2.5rem 2rem;display:flex;flex-direction:column;gap:0.85rem;text-align:left;cursor:pointer;transition:background var(--trans);border:none;}
.hero-card:hover{background:rgba(36,92,62,0.85);}
.hero-card-num{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;color:rgba(255,255,255,0.06);line-height:1;}
.hero-card-label{font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold);font-weight:600;}
.hero-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(22px,2.8vw,30px);color:var(--white);text-transform:uppercase;line-height:1.05;}
.hero-card-desc{font-size:12.5px;color:rgba(255,255,255,0.5);line-height:1.7;flex:1;font-weight:300;}
.hero-card-cta{display:inline-flex;align-items:center;gap:7px;padding:0.6rem 1.4rem;background:transparent;border:1.5px solid rgba(255,255,255,0.22);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;border-radius:6px;transition:all var(--trans);align-self:flex-start;margin-top:0.25rem;}
.hero-card:hover .hero-card-cta{background:var(--white);color:var(--dark);border-color:var(--white);}
.hero-stats{position:relative;z-index:2;background:rgba(8,22,14,0.9);border-top:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(8px);}
.hero-stats-inner{display:grid;grid-template-columns:repeat(3,1fr);max-width:820px;margin:0 auto;}
.h-stat{padding:1rem;text-align:center;border-right:1px solid rgba(255,255,255,0.06);}
.h-stat:last-child{border-right:none;}
.h-stat-n{display:block;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--white);}
.h-stat-l{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:2px;}

/* ── TRUST MARQUEE ── */
.marquee-bar{background:var(--green);overflow:hidden;padding:10px 0;border-top:1px solid rgba(255,255,255,0.1);}
.marquee-track{display:flex;gap:2rem;animation:marquee 28s linear infinite;width:max-content;}
.marquee-bar:hover .marquee-track{animation-play-state:paused;}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.marquee-pill{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;padding:0 0.5rem;}
.marquee-pill::before{content:'◆';font-size:6px;color:var(--gold);opacity:0.8;}

/* ── SECTION SHARED ── */
.section-kicker{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;font-weight:600;margin-bottom:0.5rem;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(36px,5vw,56px);text-transform:uppercase;line-height:0.95;letter-spacing:-0.01em;}
.section-sub{font-size:14px;font-weight:300;line-height:1.7;max-width:520px;}
.container{max-width:1200px;margin:0 auto;padding:0 1.5rem;}

/* ── PRO SHOP ── */
#pro-shop{background:var(--cream);padding:5rem 0 4rem;}
.shop-header{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;}
.shop-header-left .section-kicker{color:var(--green);}
.shop-header-left .section-title{color:var(--black);}
.shop-header-left .section-sub{color:var(--gray);}
.filter-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;}
.filter-pill{font-family:'Barlow',sans-serif;font-size:12px;font-weight:500;padding:0.45rem 1rem;border-radius:20px;border:1.5px solid #c8c0b0;color:var(--gray);background:transparent;cursor:pointer;transition:all var(--trans);letter-spacing:0.02em;}
.filter-pill:hover{border-color:var(--green);color:var(--green);}
.filter-pill.active{background:var(--green);color:var(--white);border-color:var(--green);}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
.club-card{background:var(--white);border:1px solid var(--gbray);border-radius:var(--radius);overflow:hidden;transition:box-shadow var(--trans),transform var(--trans);display:flex;flex-direction:column;}
.club-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.1);transform:translateY(-2px);}
.club-card.luxury{border:1.5px solid var(--gold);background:#fffdf7;}
.club-card.sold-card{opacity:0.6;pointer-events:none;}
.card-img-wrap{position:relative;height:160px;background:var(--pale);overflow:hidden;cursor:pointer;}
.club-card.luxury .card-img-wrap{background:#f5efd8;}
.card-img-wrap img{width:100%;height:100%;object-fit:contain;transition:transform 0.4s ease;}
.card-img-wrap:hover img{transform:scale(1.04);}
.card-img-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.85);border:none;cursor:pointer;width:26px;height:26px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--trans);}
.card-img-wrap:hover .card-img-nav{opacity:1;}
.card-img-nav.prev{left:6px;}
.card-img-nav.next{right:6px;}
/* Badges */
.card-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;z-index:2;}
.card-badge{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 7px;border-radius:4px;}
.badge-new{background:var(--green);color:#fff;}
.badge-featured{background:var(--gold);color:#3a2800;}
.badge-limited{background:var(--black);color:#fff;}
.badge-verified{position:absolute;bottom:8px;right:8px;background:var(--pale);color:var(--green);border:1px solid var(--gborder);font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 7px;border-radius:4px;}
.badge-sold-overlay{position:absolute;inset:0;background:rgba(200,200,200,0.7);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:0.1em;text-transform:uppercase;}
.card-body{padding:0.9rem 1rem 0.75rem;flex:1;display:flex;flex-direction:column;gap:0.35rem;}
.card-name{font-size:13px;font-weight:600;color:var(--black);line-height:1.3;}
.card-desc{font-size:10px;color:var(--gray);line-height:1.55;flex:1;}
.card-price-row{display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem;}
.card-price{font-size:16px;font-weight:700;color:var(--green);}
.club-card.luxury .card-price{color:var(--gold-d);}
.card-obo{font-size:10px;font-weight:600;color:var(--green);background:var(--pale);border:1px solid var(--gborder);border-radius:20px;padding:2px 8px;}
.club-card.luxury .card-obo{background:#fdf3d6;color:var(--gold-d);border-color:var(--gold-l);}
.card-meta{font-size:9px;color:var(--gmeta);text-align:right;margin-top:2px;}
.card-foot{display:flex;gap:0.5rem;padding:0 1rem 0.9rem;}
.btn-offer{flex:1;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;padding:0.55rem 0.75rem;border-radius:6px;cursor:pointer;transition:all var(--trans);border:1.5px solid var(--green);background:transparent;color:var(--green);letter-spacing:0.02em;}
.btn-offer:hover{background:var(--green);color:var(--white);}
.club-card.luxury .btn-offer{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
.club-card.luxury .btn-offer:hover{background:var(--gold-l);}
.btn-save{width:36px;height:36px;border-radius:6px;border:1.5px solid var(--gbray);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--trans);flex-shrink:0;}
.btn-save:hover{border-color:var(--green);}
.btn-save.saved svg{fill:#e53935;stroke:#e53935;}
.btn-save svg{width:15px;height:15px;stroke:var(--gray);fill:none;transition:all var(--trans);}
.shop-empty{text-align:center;padding:4rem 1rem;color:var(--gray);font-size:14px;grid-column:1/-1;}
.shop-loading{text-align:center;padding:4rem 1rem;color:var(--gray);font-size:14px;grid-column:1/-1;}

/* ── OFFER MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity var(--trans);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--white);border-radius:12px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.2);overflow:hidden;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--gbray);}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;}
.modal-close{width:30px;height:30px;border:none;background:none;cursor:pointer;font-size:20px;color:var(--gray);border-radius:4px;display:flex;align-items:center;justify-content:center;line-height:1;}
.modal-close:hover{background:var(--pale);}
.modal-body{padding:1.5rem;}
.m-form-group{margin-bottom:1rem;}
.m-label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px;}
.m-ctrl{width:100%;padding:0.6rem 0.75rem;border:1px solid var(--gbray);border-radius:6px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border var(--trans);}
.m-ctrl:focus{border-color:var(--green);}
.modal-foot{padding:1rem 1.5rem;border-top:1px solid var(--gbray);display:flex;gap:0.75rem;justify-content:flex-end;}
.btn-primary{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;padding:0.65rem 1.4rem;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer;transition:background var(--trans);}
.btn-primary:hover{background:var(--mid);}
.btn-ghost{font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;padding:0.65rem 1.1rem;background:none;color:var(--gray);border:1px solid var(--gbray);border-radius:6px;cursor:pointer;transition:all var(--trans);}
.btn-ghost:hover{border-color:var(--green);color:var(--green);}

/* ── LIGHTBOX ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:none;align-items:center;justify-content:center;padding:1.5rem;}
.lb.open{display:flex;}
.lb-img{max-width:min(90vw,800px);max-height:85vh;object-fit:contain;border-radius:8px;}
.lb-close{position:fixed;top:1.25rem;right:1.5rem;width:40px;height:40px;background:rgba(255,255,255,0.15);color:#fff;border:none;cursor:pointer;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;}
.lb-close:hover{background:rgba(255,255,255,0.25);}
.lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);color:#fff;border:none;cursor:pointer;width:44px;height:44px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;}
.lb-prev{left:1rem;} .lb-next{right:1rem;}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,0.25);}
.lb-counter{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:12px;}

/* ── TRADE HQ ── */
#trade-hq{background:var(--dark);padding:5rem 0 4rem;}
.trade-kicker{color:var(--gold);}
.trade-title{color:var(--white);}
.trade-promise{color:rgba(255,255,255,0.55);font-size:13.5px;line-height:1.75;margin-top:0.75rem;max-width:560px;}
.trade-promise strong{color:rgba(255,255,255,0.85);font-weight:500;}
.trade-paths{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2.5rem;margin-bottom:2.5rem;}
.path-card{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:1.75rem;cursor:pointer;transition:all var(--trans);text-align:left;}
.path-card:hover,.path-card.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);}
.path-card.active{border-color:var(--gold);}
.path-icon{font-size:28px;margin-bottom:0.75rem;}
.path-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--white);text-transform:uppercase;margin-bottom:0.35rem;}
.path-desc{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.6;}
.trade-form-wrap{display:none;}
.trade-form-wrap.active{display:block;}

/* Wizard */
.wizard-steps{display:flex;align-items:center;gap:0;margin-bottom:2rem;}
.wiz-step{display:flex;align-items:center;gap:0.5rem;font-size:11px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:0.06em;text-transform:uppercase;}
.wiz-dot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);flex-shrink:0;transition:all var(--trans);}
.wiz-step.active .wiz-dot{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.15);}
.wiz-step.active{color:rgba(255,255,255,0.85);}
.wiz-step.done .wiz-dot{border-color:var(--green);background:var(--green);color:#fff;}
.wiz-step.done{color:rgba(255,255,255,0.55);}
.wiz-line{flex:1;height:1px;background:rgba(255,255,255,0.1);margin:0 0.5rem;}
.wizard-panel{display:none;}
.wizard-panel.active{display:block;}
.wiz-nav{display:flex;gap:0.75rem;margin-top:1.75rem;align-items:center;}

/* Trade form fields */
.tf-group{margin-bottom:1.1rem;}
.tf-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:5px;}
.tf-ctrl{width:100%;padding:0.65rem 0.85rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--white);font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border var(--trans);}
.tf-ctrl:focus{border-color:var(--gold);}
.tf-ctrl option{background:var(--dark);color:var(--white);}
textarea.tf-ctrl{resize:vertical;min-height:80px;}
.radio-group{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:4px;}
.radio-pill{display:flex;align-items:center;gap:6px;padding:0.45rem 0.85rem;border-radius:20px;border:1.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--trans);}
.radio-pill:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.8);}
.radio-pill input{display:none;}
.radio-pill.checked{border-color:var(--gold);color:var(--white);background:rgba(201,168,76,0.12);}
.tf-hint{font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;}
.file-input-wrap{position:relative;cursor:pointer;}
.file-input-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.file-input-face{display:flex;align-items:center;gap:8px;padding:0.65rem 0.85rem;background:rgba(255,255,255,0.07);border:1.5px dashed rgba(255,255,255,0.2);border-radius:8px;color:rgba(255,255,255,0.45);font-size:12px;transition:all var(--trans);}
.file-input-wrap:hover .file-input-face{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.7);}
#sell-file-name,#trade-file-name{font-size:11px;color:var(--gold);margin-top:4px;display:none;}
.wiz-submit{font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;padding:0.8rem 2rem;background:var(--white);color:var(--green);border:2px solid var(--white);border-radius:8px;cursor:pointer;transition:all var(--trans);letter-spacing:0.04em;}
.wiz-submit:hover{background:transparent;color:var(--white);}
.wiz-back{font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;padding:0.75rem 1.1rem;background:transparent;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;transition:all var(--trans);}
.wiz-back:hover{color:var(--white);border-color:rgba(255,255,255,0.35);}
.wiz-next{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;padding:0.75rem 1.5rem;background:var(--green);color:var(--white);border:none;border-radius:8px;cursor:pointer;transition:background var(--trans);}
.wiz-next:hover{background:var(--mid);}
.form-success{display:none;text-align:center;padding:2.5rem 1rem;}
.form-success-icon{font-size:40px;margin-bottom:0.75rem;}
.form-success-text{font-size:16px;font-weight:500;color:var(--white);}

/* ── CADDIE'S LANE ── */
#caddies-lane{background:var(--cream);padding:5rem 0 4rem;}
.caddie-header .section-kicker{color:var(--green);}
.caddie-header .section-title{color:var(--black);}
.caddie-intro{font-size:14px;color:var(--gray);line-height:1.8;margin-top:0.75rem;max-width:540px;}
.caddie-intro strong{color:var(--black);font-weight:600;}
.caddie-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:2.5rem;}
.caddie-tier{background:var(--white);border:1px solid var(--gbray);border-radius:var(--radius);padding:2rem;}
.caddie-tier-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--black);text-transform:uppercase;margin-bottom:0.25rem;}
.caddie-tier-sub{font-size:12px;color:var(--gray);line-height:1.6;margin-bottom:1.25rem;}
.cf-group{margin-bottom:1rem;}
.cf-label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px;}
.cf-ctrl{width:100%;padding:0.6rem 0.75rem;border:1px solid var(--gbray);border-radius:6px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border var(--trans);background:var(--white);}
.cf-ctrl:focus{border-color:var(--green);}
.cf-radio-group{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:4px;}
.cf-radio-pill{display:flex;align-items:center;gap:5px;padding:0.4rem 0.75rem;border-radius:20px;border:1.5px solid var(--gbray);color:var(--gray);font-size:11px;font-weight:500;cursor:pointer;transition:all var(--trans);}
.cf-radio-pill:hover{border-color:var(--green);color:var(--green);}
.cf-radio-pill input{display:none;}
.cf-radio-pill.checked{border-color:var(--green);color:var(--green);background:var(--pale);}
.cf-btn{width:100%;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;padding:0.8rem;background:var(--green);color:var(--white);border:none;border-radius:8px;cursor:pointer;transition:background var(--trans);margin-top:0.25rem;letter-spacing:0.03em;}
.cf-btn:hover{background:var(--mid);}
.finder-fee{margin-top:1rem;padding:0.85rem 1rem;background:var(--pale);border-left:3px solid var(--green);border-radius:0 6px 6px 0;font-size:11.5px;color:var(--gray);line-height:1.7;}
.caddie-success{display:none;text-align:center;padding:2rem 1rem;}
.caddie-success-icon{font-size:36px;margin-bottom:0.5rem;}
.caddie-success-text{font-size:14px;font-weight:500;color:var(--green);}

/* ── RECENTLY SOLD ── */
#recently-sold{background:var(--dark);padding:5rem 0 4rem;}
.sold-title{color:var(--white);}
.sold-sub{color:rgba(255,255,255,0.4);font-size:14px;margin-top:0.4rem;}
.sold-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:2.5rem;}
.sold-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);overflow:hidden;}
.sold-img-wrap{height:140px;background:rgba(255,255,255,0.05);position:relative;overflow:hidden;}
.sold-img-wrap img{width:100%;height:100%;object-fit:contain;}
.sold-badge{position:absolute;top:8px;left:8px;background:rgba(100,100,100,0.85);color:rgba(255,255,255,0.9);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 7px;border-radius:4px;}
.sold-body{padding:0.85rem;}
.sold-name{font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px;}
.sold-meta{font-size:11px;color:rgba(255,255,255,0.35);display:flex;justify-content:space-between;}
.sold-price{color:var(--gold);}
.sold-empty{color:rgba(255,255,255,0.3);font-size:13px;text-align:center;padding:3rem;grid-column:1/-1;}

/* ── NEWSLETTER ── */
#newsletter{background:var(--green);padding:4rem 0;}
.nl-inner{display:flex;align-items:center;gap:3rem;flex-wrap:wrap;}
.nl-copy .section-title{color:var(--white);font-size:clamp(28px,4vw,44px);}
.nl-copy .section-sub{color:rgba(255,255,255,0.6);margin-top:0.4rem;}
.nl-form{display:flex;gap:0.75rem;flex:1;min-width:280px;max-width:440px;}
.nl-input{flex:1;padding:0.8rem 1rem;border:none;border-radius:8px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;}
.nl-btn{font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;padding:0.8rem 1.5rem;background:var(--white);color:var(--green);border:none;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all var(--trans);}
.nl-btn:hover{background:var(--pale);}
.nl-fine{font-size:11px;color:rgba(255,255,255,0.4);margin-top:0.5rem;}

/* ── FOOTER ── */
#footer{background:var(--black);padding:3rem 0 2rem;}
.footer-inner{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:2.5rem;}
.footer-logo-main{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:0.04em;color:var(--white);}
.footer-logo-main span{color:var(--gold);}
.footer-tagline{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.06em;margin-top:4px;}
.footer-email{font-size:12px;color:rgba(255,255,255,0.45);margin-top:0.75rem;}
.footer-social{display:flex;gap:0.6rem;margin-top:1rem;}
.footer-social a{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:rgba(255,255,255,0.45);transition:all var(--trans);}
.footer-social a:hover{color:var(--white);border-color:rgba(255,255,255,0.4);}
.footer-social svg{width:15px;height:15px;}
.footer-col-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:0.85rem;}
.footer-links{display:flex;flex-direction:column;gap:0.45rem;}
.footer-links a{font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none;transition:color var(--trans);}
.footer-links a:hover{color:var(--white);}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.07);flex-wrap:wrap;gap:0.75rem;}
.footer-copy{font-size:11px;color:rgba(255,255,255,0.2);}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--black);color:#fff;padding:0.75rem 1.25rem;border-radius:8px;font-size:13px;z-index:999;transform:translateY(20px);opacity:0;transition:all 0.25s ease;pointer-events:none;max-width:320px;line-height:1.5;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .shop-grid{grid-template-columns:repeat(2,1fr);}
  .sold-grid{grid-template-columns:repeat(2,1fr);}
  .footer-inner{grid-template-columns:1fr 1fr;}
}
@media(max-width:768px){
  .nav-links{display:none;}
  .nav-right .nav-social,.nav-right .nav-cta{display:none;}
  .nav-hamburger{display:flex;}
  .hero-split{grid-template-columns:1fr;}
  .hero-card:first-child{border-bottom:1px solid rgba(255,255,255,0.08);}
  .trade-paths{grid-template-columns:1fr;}
  .caddie-grid{grid-template-columns:1fr;}
  .nl-inner{flex-direction:column;gap:1.5rem;}
  .nl-form{max-width:100%;}
  .footer-inner{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .shop-grid{grid-template-columns:1fr;}
  .sold-grid{grid-template-columns:1fr 1fr;}
  .hero-stats-inner{grid-template-columns:repeat(3,1fr);}
  .hero-h1{font-size:52px;}
}
</style>
